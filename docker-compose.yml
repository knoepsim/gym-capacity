version: '3.9'

services:
  # PostgreSQL Datenbank
  postgres:
    image: postgres:16-alpine
    container_name: gym_postgres
    environment:
      POSTGRES_USER: gym_user
      POSTGRES_PASSWORD: gym_password
      POSTGRES_DB: gym_capacity
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gym_user -d gym_capacity"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gym_network
    restart: unless-stopped

  # Next.js Web App mit integriertem Fetch-Endpoint
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gym_web
    environment:
      DATABASE_URL: "postgresql://gym_user:gym_password@postgres:5432/gym_capacity"
      FETCH_API_KEY: ${FETCH_API_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gym_network
    restart: unless-stopped

  # Interner Cron-Service (ruft alle 5 Min die Fetch-API auf)
  cron:
    build:
      context: .
      dockerfile: Dockerfile.cron
    container_name: gym_cron
    depends_on:
      - web
    networks:
      - gym_network
    restart: unless-stopped

  # Database Admin UI
  adminer:
    image: adminer:latest
    container_name: gym_adminer
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gym_network
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  postgres_data:
    driver: local

networks:
  gym_network:
    driver: bridge
